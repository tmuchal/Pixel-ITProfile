  </filter>
  <!-- Scanline texture -->
  <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
    <rect x="0" y="0" width="2" height="1" fill="#ffffff" opacity="0.03"/>
  </pattern>
</defs>
